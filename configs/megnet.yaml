# MEGNet model configuration for cathode property prediction
# Fine-tunes pretrained MEGNet from matgl
# NOTE: Architecture params inherited from pretrained model -- do not override

model:
  pretrained_model: "MEGNet-MP-2018.6.1-Eform"  # Verified via get_available_pretrained_models()
  # If this model name is not found at runtime, train_megnet will list available
  # MEGNet models and select the closest match

training:
  optimizer: adam
  learning_rate: 0.0001       # Lower LR for fine-tuning (vs CGCNN's 0.001)
  weight_decay: 0.0
  batch_size: 128             # Larger batches for MEGNet (vs CGCNN's 64)
  n_epochs: 1000              # More epochs with lower LR (vs CGCNN's 400)
  early_stopping_patience: 100  # More patience due to lower LR
  scheduler:
    type: reduce_on_plateau
    factor: 0.5
    patience: 50
    min_lr: 1.0e-7

results_dir: "data/results/megnet"
