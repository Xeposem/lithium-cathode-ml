# CGCNN model configuration for cathode property prediction
# Architecture follows Xie & Grossman (2018) with PyG CGConv layers

model:
  hidden_dim: 128
  n_conv: 3
  n_fc: 1
  batch_norm: true

training:
  optimizer: adam
  learning_rate: 0.001
  weight_decay: 0.0
  batch_size: 64
  n_epochs: 400
  early_stopping_patience: 50
  scheduler:
    type: reduce_on_plateau
    factor: 0.5
    patience: 30
    min_lr: 1.0e-6

results_dir: "data/results/cgcnn"
